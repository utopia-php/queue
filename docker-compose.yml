services:
  redis:
    image: redis:alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis-cluster:
    image: grokzen/redis-cluster:7.0.10
    environment:
      IP: "0.0.0.0"
      INITIAL_PORT: 17000
      MASTERS: 3
      SLAVES_PER_MASTER: 0
    ports:
      - "17000-17002:17000-17002"
    healthcheck:
      test: ["CMD-SHELL", "for p in 17000 17001 17002; do redis-cli -p $$p cluster info | grep -q cluster_state:ok || exit 1; done"]
      interval: 2s
      timeout: 5s
      retries: 30
